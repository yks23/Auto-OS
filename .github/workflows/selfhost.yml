name: selfhost

on:
  push:
    branches: [main]
    paths:
      - "patches/**"
      - "scripts/**"
      - "tests/selfhost/**"
      - ".github/workflows/selfhost.yml"
      - "PIN.toml"
  pull_request:
    paths:
      - "patches/**"
      - "scripts/**"
      - "tests/selfhost/**"
      - ".github/workflows/selfhost.yml"
      - "PIN.toml"
  workflow_dispatch:

jobs:
  sanity:
    name: sanity-check (patches apply cleanly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Init tgoskits submodule
        run: git submodule update --init tgoskits
      - name: Run sanity-check
        run: ./scripts/sanity-check.sh

  build-matrix:
    name: build (${{ matrix.arch }})
    needs: sanity
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [riscv64, x86_64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Init tgoskits submodule
        run: git submodule update --init tgoskits

      - name: Install host deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake clang qemu-system-misc xz-utils

      - name: Install Rust toolchain
        run: |
          rustup show
          rustup target add ${{ matrix.arch }}-unknown-none-elf || true
          rustup target add ${{ matrix.arch }}-unknown-linux-musl || true

      - name: Setup musl cross toolchain
        run: |
          set -e
          case "${{ matrix.arch }}" in
            riscv64) URL="https://github.com/arceos-org/setup-musl/releases/download/prebuilt/riscv64-linux-musl-cross.tgz" ;;
            x86_64)  URL="https://github.com/arceos-org/setup-musl/releases/download/prebuilt/x86_64-linux-musl-cross.tgz" ;;
            *) exit 1 ;;
          esac
          mkdir -p $HOME/musl
          curl -fsSL "$URL" | tar -xz -C $HOME/musl
          echo "$HOME/musl/${{ matrix.arch }}-linux-musl-cross/bin" >> $GITHUB_PATH

      - name: Apply all patches
        run: ./scripts/apply-patches.sh --reset

      - name: Build kernel
        run: ./scripts/build.sh ARCH=${{ matrix.arch }}

  ci-test-matrix:
    name: ci-test (${{ matrix.arch }})
    needs: build-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [riscv64, x86_64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Init tgoskits submodule
        run: git submodule update --init tgoskits
      - name: Install host deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake clang qemu-system-misc xz-utils python3

      - name: Apply all patches
        run: ./scripts/apply-patches.sh --reset

      # ci-test 走 starryos 自带 ./scripts/ci-test.py，依赖 rootfs 镜像；
      # 镜像很大（~100 MB），CI 第一次会下载，后续 cache。
      - name: Cache rootfs image
        uses: actions/cache@v4
        with:
          path: tgoskits/os/StarryOS/rootfs-${{ matrix.arch }}.img
          key: rootfs-${{ matrix.arch }}-20260214

      - name: Run ci-test
        timeout-minutes: 30
        run: |
          cd tgoskits/os/StarryOS
          make ARCH=${{ matrix.arch }} rootfs
          make ARCH=${{ matrix.arch }} ci-test || echo "WARN: ci-test reported non-zero (expected during early Phase 0/1)"
